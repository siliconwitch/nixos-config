general {
    hide_cursor = true
}

background {
    monitor =
    path = ~/.config/wallpaper.jpg
    blur_passes = 2
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 0
    dots_size = 0.16
    dots_spacing = 0.21
    inner_color = rgba(0, 0, 0, 0.25)
    font_color = rgba(242, 243, 244, 0.75)
    placeholder_text =
    check_color = rgba(242, 243, 244, 0.75)
    fail_color = rgba(0, 0, 0, 0.25)
    fail_text =
    position = 0, -100
}

label {
  monitor =
  text = cmd[update:1000] date +"%A, %B %d"
  color = rgba(242, 243, 244, 0.75)
  font_size = 22
  font_family = AnonymicePro Nerd Font
  position = 0, 300
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] date +"%H:%M"
  color = rgba(242, 243, 244, 0.75)
  font_size = 95
  font_family = AnonymicePro Nerd Font Bold
  position = 0, 200
  halign = center
  valign = center
}
